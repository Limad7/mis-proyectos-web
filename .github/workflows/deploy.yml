name: Deploy Project to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - '**/'  # Desplegar cualquier proyecto que cambie

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # Este workflow se ajusta para desplegar el proyecto que cambió
        # Para múltiples proyectos simultáneos, se necesitarían workflows separados
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4